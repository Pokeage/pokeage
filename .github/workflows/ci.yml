name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  engine:
    name: engine and sdk (typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - name: typecheck
        run: npm run typecheck
      - name: test
        run: npm test
      - name: format check
        run: npm run format:check
        continue-on-error: true

  cli:
    name: cli (rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: check
        run: cargo check -p pokeage-cli
      - name: fmt
        run: cargo fmt --all --check
        continue-on-error: true
      - name: clippy
        run: cargo clippy -p pokeage-cli -- -W warnings
        continue-on-error: true

  secrets:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
